<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hội Lưu Ly - Quản Lý Hoa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tier-red { border: 3px solid #ef4444; }
        .tier-orange { border: 3px solid #f97316; }
        .tier-purple { border: 3px solid #a855f7; }
        .tier-blue { border: 3px solid #3b82f6; }
    </style>
</head>
<body class="bg-sky-50 p-4 font-sans">
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-black text-center text-blue-900 mb-6">🌸 HỘI LƯU LY 🌸</h1>

        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-blue-100">
            <label class="text-xs font-black text-blue-600 block mb-2">🔍 TÌM KIẾM BỘ SƯU TẬP HỘI VIÊN:</label>
            <div class="flex gap-2">
                <input type="text" id="search-name" placeholder="Nhập tên..." class="w-full p-2 border rounded-xl">
                <button onclick="xemBoSuuTapKhac()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">Xem</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6">
            <input type="text" id="username" placeholder="Tên của bạn để lưu..." class="w-full p-2 border rounded-xl mb-2">
            <button onclick="luuBoSuuTap()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">💾 Lưu Bộ Sưu Tập Của Tôi</button>
        </div>

        <div id="flower-grid" class="grid grid-cols-3 gap-3"></div>
    </div>

    <script>
        const BIN_ID = '6a42a0f6f5f4af5e2942c44f'; 
        const MASTER_KEY = '$2a$10$xqWM3mrnaAnFrOuWsFgrIufgskPom60ZR.dftWeiE9TX7fnbSUOzS';
        let dataTong = { hoa: [], thanhVien: {} };

        async function loadData() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': MASTER_KEY} });
            const json = await res.json();
            dataTong = json.record;
            renderHoa();
        }

        function renderHoa(tenHienThi = "") {
            const grid = document.getElementById('flower-grid');
            const hoaCuaNguoiDangXem = dataTong.thanhVien[tenHienThi] || [];
            
            grid.innerHTML = dataTong.hoa.map(h => `
                <div class="bg-white p-2 rounded-2xl text-center border-2 ${tenHienThi && hoaCuaNguoiDangXem.includes(h.ten) ? 'border-green-500' : 'border-gray-200'}">
                    <input type="checkbox" class="flower-check" value="${h.ten}" ${hoaCuaNguoiDangXem.includes(h.ten) ? 'checked' : ''}>
                    <img src="${h.anh}" class="w-full aspect-square object-cover rounded-lg">
                    <p class="text-[10px] font-bold truncate">${h.ten}</p>
                </div>
            `).join('');
        }

        function xemBoSuuTapKhac() {
            const name = document.getElementById('search-name').value;
            renderHoa(name);
        }

        async function luuBoSuuTap() {
            const name = document.getElementById('username').value;
            if(!name) return alert("Nhập tên!");
            const checked = Array.from(document.querySelectorAll('.flower-check:checked')).map(c => c.value);
            
            dataTong.thanhVien[name] = checked;
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY},
                body: JSON.stringify(dataTong)
            });
            alert("Đã lưu bộ sưu tập lên Cloud!");
            renderHoa(name);
        }

        loadData();
    </script>
</body>
</html>
